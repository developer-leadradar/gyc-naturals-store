<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Gye Nyame — "Except God" — omnipotence symbol -->
  <!-- Central oval ring -->
  <ellipse cx="24" cy="24" rx="10" ry="14" fill="none" stroke="#2D6A4F" stroke-width="2.5"/>
  <!-- Inner oval -->
  <ellipse cx="24" cy="24" rx="5" ry="8" fill="none" stroke="#2D6A4F" stroke-width="1.5"/>
  <!-- Top flourish -->
  <path d="M24 10 C20 6, 16 8, 16 12 C16 16, 24 14, 24 10 Z" fill="#2D6A4F"/>
  <path d="M24 10 C28 6, 32 8, 32 12 C32 16, 24 14, 24 10 Z" fill="#2D6A4F"/>
  <!-- Bottom flourish -->
  <path d="M24 38 C20 42, 16 40, 16 36 C16 32, 24 34, 24 38 Z" fill="#2D6A4F"/>
  <path d="M24 38 C28 42, 32 40, 32 36 C32 32, 24 34, 24 38 Z" fill="#2D6A4F"/>
  <!-- Left wing -->
  <path d="M14 24 C8 20, 6 16, 10 14 C14 12, 14 18, 14 24 Z" fill="#2D6A4F" opacity="0.8"/>
  <!-- Right wing -->
  <path d="M34 24 C40 20, 42 16, 38 14 C34 12, 34 18, 34 24 Z" fill="#2D6A4F" opacity="0.8"/>
  <!-- Center dot -->
  <circle cx="24" cy="24" r="2.5" fill="#2D6A4F"/>
</svg>
