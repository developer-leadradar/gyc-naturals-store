<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 290 72" width="290" height="72">
  <defs>
    <linearGradient id="leafFillH" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#52B788"/>
      <stop offset="40%" stop-color="#2D6A4F"/>
      <stop offset="100%" stop-color="#1B4332"/>
    </linearGradient>
    <radialGradient id="leafHlH" cx="50%" cy="20%" r="55%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Leaves cluster scaled to 60px tall, centered at x=36 -->
  <g transform="translate(36,36) scale(0.46) translate(-100,-75)">
    <!-- Left leaf -->
    <g transform="rotate(-42, 100, 120)">
      <path d="M 100 120 C 84 102, 70 72, 100 22 C 130 72, 116 102, 100 120 Z" fill="url(#leafFillH)"/>
      <path d="M 100 120 C 84 102, 70 72, 100 22 C 130 72, 116 102, 100 120 Z" fill="url(#leafHlH)"/>
      <line x1="100" y1="118" x2="100" y2="28" stroke="#FFFFFF" stroke-width="2" opacity="0.75"/>
    </g>
    <!-- Right leaf -->
    <g transform="rotate(42, 100, 120)">
      <path d="M 100 120 C 84 102, 70 72, 100 22 C 130 72, 116 102, 100 120 Z" fill="url(#leafFillH)"/>
      <path d="M 100 120 C 84 102, 70 72, 100 22 C 130 72, 116 102, 100 120 Z" fill="url(#leafHlH)"/>
      <line x1="100" y1="118" x2="100" y2="28" stroke="#FFFFFF" stroke-width="2" opacity="0.75"/>
    </g>
    <!-- Center leaf -->
    <path d="M 100 120 C 83 100, 70 68, 100 18 C 130 68, 117 100, 100 120 Z" fill="url(#leafFillH)"/>
    <path d="M 100 120 C 83 100, 70 68, 100 18 C 130 68, 117 100, 100 120 Z" fill="url(#leafHlH)"/>
    <line x1="100" y1="118" x2="100" y2="24" stroke="#FFFFFF" stroke-width="2.2" opacity="0.8"/>
    <path d="M 91 132 L 100 118 L 109 132 Q 100 135 91 132 Z" fill="#FFFFFF"/>
  </g>

  <!-- Text -->
  <text x="78" y="42" text-anchor="start"
        font-family="'Montserrat','Arial Black','Arial',sans-serif"
        font-weight="900" font-size="22" fill="#111111"
        letter-spacing="1.5">GYC NATURALS</text>
</svg>
