<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 195" width="200" height="195">
  <defs>
    <linearGradient id="leafFill" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#52B788"/>
      <stop offset="40%" stop-color="#2D6A4F"/>
      <stop offset="100%" stop-color="#1B4332"/>
    </linearGradient>
    <radialGradient id="leafHighlight" cx="50%" cy="20%" r="55%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="leafHighlightL" cx="60%" cy="20%" r="55%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="leafHighlightR" cx="40%" cy="20%" r="55%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Left leaf (behind center, rotated -42 degrees around stem base) -->
  <g transform="rotate(-42, 100, 120)">
    <path d="M 100 120 C 84 102, 70 72, 100 22 C 130 72, 116 102, 100 120 Z"
          fill="url(#leafFill)"/>
    <path d="M 100 120 C 84 102, 70 72, 100 22 C 130 72, 116 102, 100 120 Z"
          fill="url(#leafHighlightL)"/>
    <line x1="100" y1="118" x2="100" y2="28" stroke="#FFFFFF" stroke-width="1.5" opacity="0.75"/>
  </g>

  <!-- Right leaf (behind center, rotated +42 degrees) -->
  <g transform="rotate(42, 100, 120)">
    <path d="M 100 120 C 84 102, 70 72, 100 22 C 130 72, 116 102, 100 120 Z"
          fill="url(#leafFill)"/>
    <path d="M 100 120 C 84 102, 70 72, 100 22 C 130 72, 116 102, 100 120 Z"
          fill="url(#leafHighlightR)"/>
    <line x1="100" y1="118" x2="100" y2="28" stroke="#FFFFFF" stroke-width="1.5" opacity="0.75"/>
  </g>

  <!-- Center leaf (front, upright) -->
  <path d="M 100 120 C 83 100, 70 68, 100 18 C 130 68, 117 100, 100 120 Z"
        fill="url(#leafFill)"/>
  <path d="M 100 120 C 83 100, 70 68, 100 18 C 130 68, 117 100, 100 120 Z"
        fill="url(#leafHighlight)"/>
  <!-- Center vein -->
  <line x1="100" y1="118" x2="100" y2="24" stroke="#FFFFFF" stroke-width="1.8" opacity="0.8"/>

  <!-- White stem base -->
  <path d="M 91 132 L 100 118 L 109 132 Q 100 135 91 132 Z" fill="#FFFFFF"/>

  <!-- Text -->
  <text x="100" y="172" text-anchor="middle"
        font-family="'Montserrat','Arial Black','Arial',sans-serif"
        font-weight="900" font-size="18" fill="#111111"
        letter-spacing="2">GYC NATURALS</text>
</svg>
