<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Sankofa bird — stylised African symbol -->
  <!-- Body: heart-like shape -->
  <path d="M24 38 C14 30, 6 22, 8 14 C10 8, 18 8, 22 14 C22 14, 22 10, 24 8 C26 10, 26 14, 26 14 C30 8, 38 8, 40 14 C42 22, 34 30, 24 38 Z"
        fill="#C9A84C" opacity="0.9"/>
  <!-- Head (looking backward — circle at upper left) -->
  <circle cx="14" cy="10" r="5" fill="#C9A84C"/>
  <!-- Eye -->
  <circle cx="12" cy="9" r="1.2" fill="#FEFAE0"/>
  <circle cx="12" cy="9" r="0.6" fill="#1C1F1A"/>
  <!-- Beak -->
  <path d="M10 12 L7 14 L10 13 Z" fill="#C9A84C"/>
  <!-- Tail feather curl -->
  <path d="M24 38 C28 42, 36 42, 38 38 C40 34, 36 30, 32 32"
        fill="none" stroke="#C9A84C" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Egg in centre -->
  <ellipse cx="24" cy="22" rx="4" ry="5" fill="#FEFAE0" opacity="0.7"/>
</svg>
